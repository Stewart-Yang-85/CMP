  /sims:batch-status-change:
    post:
      tags: [SIMs]
      summary: Batch Change SIM Status
      description: Batch update SIM status with per-SIM results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimBatchStatusChangeRequest'
      responses:
        '200':
          description: All SIMs processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimBatchStatusChangeResponse'
              examples:
                success:
                  summary: All succeeded
                  value:
                    action: DEACTIVATE
                    targetStatus: DEACTIVATED
                    total: 2
                    succeeded: 2
                    failed: 0
                    idempotent: 1
                    items:
                      - simId: 11111111-1111-1111-1111-111111111111
                        iccid: 8986012345678901234
                        ok: true
                        idempotent: true
                        beforeStatus: DEACTIVATED
                        afterStatus: DEACTIVATED
                      - simId: 22222222-2222-2222-2222-222222222222
                        iccid: 8986012345678901235
                        ok: true
                        beforeStatus: ACTIVATED
                        afterStatus: DEACTIVATED
        '207':
          description: Partial success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimBatchStatusChangeResponse'
              examples:
                partial:
                  summary: Mixed results with error codes
                  value:
                    action: RETIRE
                    targetStatus: RETIRED
                    total: 4
                    succeeded: 1
                    failed: 3
                    idempotent: 0
                    items:
                      - simId: 33333333-3333-3333-3333-333333333333
                        iccid: 8986012345678901236
                        ok: true
                        beforeStatus: DEACTIVATED
                        afterStatus: RETIRED
                      - input: 8986012345678901237
                        ok: false
                        errorCode: COMMITMENT_NOT_MET
                        errorMessage: Retire blocked until 2026-08-01T00:00:00.000Z.
                      - input: bad-id
                        ok: false
                        errorCode: INVALID_SIM_ID
                        errorMessage: simId must be a valid uuid or 18-20 digit iccid.
                      - simId: 44444444-4444-4444-4444-444444444444
                        iccid: 8986012345678901238
                        ok: false
                        errorCode: INVALID_STATE
                        errorMessage: sim status ACTIVATED cannot transition to RETIRED.
        '400':
          description: Invalid request or all SIMs failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

