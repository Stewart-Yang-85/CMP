          type: string

    # --- SIM Schemas ---
    SimCard:
      type: object
      properties:
        iccid:
          type: string
          pattern: '^[0-9]{18,20}$'
          description: Integrated Circuit Card Identifier (Physical ID)
          example: "89860012345678901234"
        imsi:
          type: string
          description: International Mobile Subscriber Identity (Network ID)
          example: "460001234567890"
        msisdn:
          type: string
          description: Mobile Station International Subscriber Directory Number
          example: "8613800138000"
        status:
          type: string
          enum: [INVENTORY, TEST_READY, ACTIVATED, DEACTIVATED, RETIRED]
          description: Lifecycle state of the SIM
        apn:
          type: string
          example: "cmiot"
        planName:
          type: string
          example: "IoT-500MB-Monthly"
        activationDate:
          type: string
          format: date-time
        imeiLocked:
          type: boolean
          description: Whether the SIM is locked to a specific device IMEI

    SimStatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ACTIVATED, DEACTIVATED]
          description: The target status to transition to.
        reason:
          type: string
          description: Reason for the status change (e.g., "Customer Request", "Stolen").

    SimPlanChange:
      type: object
      required:
        - newPlanCode
      properties:
        newPlanCode:
          type: string
          example: "PLAN_1GB_2024"
        effectiveDate:
          type: string
          enum: [IMMEDIATE, NEXT_CYCLE]
          default: NEXT_CYCLE
          description: When the new plan should take effect.

    # --- Usage & Billing Schemas ---
    DataUsageRecord:
      type: object
      properties:
        periodStart:
          type: string
          format: date-time
        periodEnd:
          type: string
          format: date-time
        uplinkBytes:
          type: integer
          format: int64
        downlinkBytes:
          type: integer
          format: int64
        totalBytes:
          type: integer
          format: int64
        sessionCount:
          type: integer

    BalanceInfo:
      type: object
      properties:
        currency:
          type: string
          example: "CNY"
        accountBalance:
          type: number
          format: float
          description: Monetary balance for prepaid accounts.
        dataBalanceBytes:
          type: integer
          format: int64
          description: Remaining data quota in bytes.
        smsBalanceCount:
          type: integer
          description: Remaining SMS quota.

    # --- Diagnostic Schemas ---
    ConnectionStatus:
      type: object
      properties:
        iccid:
          type: string
          pattern: '^[0-9]{18,20}$'
        onlineStatus:
          type: string
          enum: [ONLINE, OFFLINE]
        registrationStatus:
          type: string
          enum: [REGISTERED_HOME, REGISTERED_ROAMING, NOT_REGISTERED, DENIED]
        lastActiveTime:
          type: string
          format: date-time
        ipAddress:
          type: string
          format: ipv4
        ratType:
          type: string
          description: Radio Access Technology
          example: "NB-IoT"
        servingCellId:
          type: string
          description: Cell ID of the current base station

    Job:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [QUEUED, RUNNING, SUCCEEDED, FAILED, CANCELLED]
        progress:
          type: object
          properties:
            processed:
              type: integer
              format: int64
            total:
              type: integer
              format: int64
        errorSummary:
          type: string

    Bill:
      type: object
      properties:
        billId:
          type: string
        enterpriseId:
          type: string
        period:
          type: string
          example: "2026-02"
