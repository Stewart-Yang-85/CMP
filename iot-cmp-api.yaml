  /sims/import-jobs:
    post:
      tags: [SIMs]
      summary: Import SIMs from CSV
      description: Upload a CSV file to create SIMs in bulk as an async job. Allowed roles are platform_admin and reseller_admin.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [resellerId, supplierId, operatorId, apn, file]
              properties:
                resellerId:
                  type: string
                  format: uuid
                supplierId:
                  type: string
                  format: uuid
                operatorId:
                  type: string
                  format: uuid
                apn:
                  type: string
                batchId:
                  type: string
                  nullable: true
                file:
                  type: string
                  format: binary
                  description: >-
                    CSV file. Required columns: iccid, imsi.
                    Optional columns: msisdn, secondaryImsi1, secondaryImsi2, secondaryImsi3,
                    formFactor, activationCode, imei, imeiLockEnabled. See example below.
            examples:
              sample:
                summary: CSV example
                value:
                  resellerId: "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa"
                  supplierId: "11111111-1111-1111-1111-111111111111"
                  batchId: "import-2026-03-07"
                  operatorId: "22222222-2222-2222-2222-222222222222"
                  apn: "internet"
                  file: |
                    iccid,imsi,msisdn
                    893107032536638556,460001234567890,13900000000
      responses:
        '202':
          description: Import job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimImportJobAcceptedResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

