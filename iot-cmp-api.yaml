  /admin/jobs:csv:
    get:
      tags: [Admin]
      operationId: adminJobsCsv
      summary: Export Jobs CSV (Admin)
      description: Internal admin endpoint to export jobs as CSV with filters.
      security:
        - AdminApiKeyAuth: []
      parameters:
        - name: jobType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [QUEUED, RUNNING, SUCCEEDED, FAILED, CANCELLED]
        - name: requestId
          in: query
          schema:
            type: string
          description: Filter jobs by requestId (traceId)
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [startedAt, finishedAt]
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
          description: Filter jobs started on or after this date
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
          description: Filter jobs started on or before this date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 1000
      responses:
        '200':
          description: CSV export of jobs
          content:
            text/csv:
              schema:
                type: string
          headers:
            X-Filters:
              description: Summary of applied filters for this export
              schema:
                type: string
  /admin/events:
    get:
      tags: [Admin]
      operationId: adminEvents
      summary: List Events (Admin)
      description: Internal admin endpoint to list events with filters.
      security:
        - AdminApiKeyAuth: []
      parameters:
        - name: eventType
          in: query
          schema:
            type: string
        - name: tenantId
          in: query
          schema:
            type: string
        - name: requestId
          in: query
          schema:
            type: string
        - name: iccid
          in: query
          schema:
            type: string
            pattern: '^[0-9]{18,20}$'
          description: Filter by payload.iccid
        - name: beforeStatus
          in: query
          schema:
            type: string
          description: Filter by payload.beforeStatus
        - name: afterStatus
          in: query
          schema:
            type: string
