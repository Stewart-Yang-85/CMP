  /subscriptions:
    get:
      tags: [Subscriptions]
      summary: List Subscriptions
      description: List subscriptions for the enterprise, with optional filters.
      parameters:
        - name: enterpriseId
          in: query
          schema:
            type: string
            format: uuid
          description: |
            Filter by enterprise. Required for reseller and platform (X-API-Key). For platform JWT with enterprise scope, may be omitted. For customer, do not pass or must match token (otherwise 403).
        - name: iccid
          in: query
          schema:
            type: string
            pattern: '^[0-9]{18,20}$'
          description: Filter by SIM ICCID
        - name: state
          in: query
          schema:
            type: string
            enum: [PENDING, ACTIVE, CANCELLED, EXPIRED]
          description: Filter by subscription state
        - name: kind
          in: query
          schema:
            type: string
            enum: [MAIN, ADD_ON]
          description: Filter by subscription kind
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Subscriptions list
          headers:
            X-Filters:
              description: Summary of applied filters
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Bad request (e.g. missing enterpriseId for reseller)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Subscriptions]
      summary: Create Subscription
      description: |
        Unified interface for 4 subscription capabilities: 1) 立即订阅 MAIN, 2) 下周期订阅 MAIN, 4) 立即订阅 ADD_ON, 5) 下周期订阅 ADD_ON.
        - **Admin key / Reseller**: `enterpriseId` required.
        - **Customer**: `enterpriseId` optional (omit or provide correct value).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionCreateRequest'
            examples:
              immediateMain:
                summary: "1) 立即订阅 MAIN"
                value:
                  enterpriseId: "88962922-f9e3-42a1-bc86-d1708ed70f7a"
                  iccid: "89860012345678901234"
                  packageVersionId: "pkgv_123"
                  kind: "MAIN"
                  effectiveAt: "2026-03-12T08:00:00Z"
              nextCycleMain:
                summary: "2) 下周期订阅 MAIN"
                value:
                  enterpriseId: "88962922-f9e3-42a1-bc86-d1708ed70f7a"
                  iccid: "89860012345678901234"
                  packageVersionId: "pkgv_123"
                  kind: "MAIN"
                  effectiveAt: "2026-04-01T00:00:00Z"
              immediateAddOn:
                summary: "4) 立即订阅 ADD_ON"
                value:
                  enterpriseId: "88962922-f9e3-42a1-bc86-d1708ed70f7a"
                  iccid: "89860012345678901234"
                  packageVersionId: "pkgv_456"
                  kind: "ADD_ON"
                  effectiveAt: "2026-03-12T08:00:00Z"
              nextCycleAddOn:
                summary: "5) 下周期订阅 ADD_ON"
                value:
                  enterpriseId: "88962922-f9e3-42a1-bc86-d1708ed70f7a"
                  iccid: "89860012345678901234"
                  packageVersionId: "pkgv_456"
                  kind: "ADD_ON"
                  effectiveAt: "2026-04-01T00:00:00Z"
      responses:
        '200':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionCreateResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: SIM or packageVersion not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict creating immediate MAIN subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: SIM does not belong to your enterprise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Invalid request (missing parameters or invalid effectiveAt)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /subscriptions:switch:
    post:
      tags: [Subscriptions]
      summary: Switch MAIN Subscription
      description: |
        Convenience API for MAIN switch = cancel current MAIN + next-cycle subscribe new MAIN (atomic).
        - **Admin key / Reseller**: `enterpriseId` required.
        - **Customer**: `enterpriseId` optional (omit or provide correct value).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionSwitchRequest'
            examples:
              switchMain:
                summary: MAIN switch (cancel + next-cycle subscribe)
                value:
                  enterpriseId: "88962922-f9e3-42a1-bc86-d1708ed70f7a"
                  iccid: "89860012345678901234"
                  fromSubscriptionId: "0218a05b-8e13-4b03-b0b7-8aa97a63cbab"
                  toPackageVersionId: "pkgv_def"
      responses:
        '200':
          description: Switch scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionSwitchResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: SIM or subscription or packageVersion not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Only MAIN subscription can be switched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: SIM does not belong to your enterprise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /subscriptions/{subscriptionId}:cancel:
    post:
      tags: [Subscriptions]
      summary: Cancel Subscription (3) 取消 MAIN
      description: |
        Cancel an existing subscription.
        - **PENDING**: Can cancel immediately.
        - **ACTIVE**: Cannot cancel immediately; use immediate=false to queue cancel at end of cycle (MAIN) or expires_at (ADD_ON).
        - **Admin key / Reseller**: enterpriseId required (query or body).
        - **Customer**: enterpriseId optional (omit or provide correct value).
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
        - name: enterpriseId
          in: query
          schema:
            type: string
            format: uuid
          description: Enterprise scope (alternative to body.enterpriseId)
        - name: immediate
          in: query
          schema:
            type: boolean
          description: true=immediate cancel, false=end of month
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionCancelRequest'
            examples:
              cancelImmediate:
                summary: Cancel immediately
                value:
                  enterpriseId: "88962922-f9e3-42a1-bc86-d1708ed70f7a"
                  immediate: true
              cancelEndOfMonth:
                summary: Cancel at end of month
                value:
                  enterpriseId: "88962922-f9e3-42a1-bc86-d1708ed70f7a"
                  immediate: false
      responses:
        '200':
          description: Cancellation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionCancelResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Subscription does not belong to your enterprise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: ACTIVE subscription cannot be cancelled immediately (use immediate=false)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Cancel already scheduled for this subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

