openapi: 3.0.3
info:
  title: IoT Connectivity Management Platform API
  description: >
    Core API for managing IoT SIM lifecycles, billing, and real-time connectivity diagnostics.
    Designed for MNOs, MVNOs, and Enterprise customers.
  version: 1.0.0
  contact:
    name: API Support
    email: support@iot-cmp.com

servers:
  - url: https://api.iot-cmp.com/v1
    description: Production Server
  - url: https://sandbox-api.iot-cmp.com/v1
    description: Sandbox Server

security:
  - BearerAuth: []
  - ApiKeyAuth: []

tags:
  - name: Authentication
    description: Token issuance and auth helpers
  - name: Subscriptions
    description: Subscription lifecycle and operations
  - name: SIMs
    description: SIM search, details, plans, and subscriptions
  - name: Diagnostics
    description: Connectivity and location diagnostics
  - name: Alerts
    description: Monitoring alerts and notifications
  - name: Events
    description: Event query and history
  - name: Billing
    description: Bills and exports
  - name: Webhooks
    description: Webhook subscription management and deliveries
  - name: Admin
    description: Internal admin endpoints
  - name: Jobs
    description: Job status tracking
  - name: Packages
    description: Package catalog and versions
  - name: PricePlans
    description: Price plan catalog and versions
  - name: NetworkProfiles
    description: APN and roaming profile management
  - name: Resellers
    description: Reseller management
  - name: Enterprises
    description: Enterprise tenant management
  - name: Dunning
    description: Overdue / credit control summary and manual resolve (US7)
  - name: Departments
    description: Department management within enterprises
  - name: Suppliers
    description: Connectivity supplier management
  - name: Reconciliation
    description: Upstream reconciliation runs and mismatch analysis
  - name: Users
    description: Tenant user management
  - name: AuditLogs
    description: Audit log access for tenant operations
  - name: CommercialTerms
    description: Commercial terms module validation
  - name: ControlPolicy
    description: Control policy module validation
  - name: CarrierService
    description: Carrier service module validation

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

    AdminApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Admin key for internal endpoints (same header name, different value).

  schemas:
    # --- Common Schemas ---
    Error:
      type: object
      properties:
        code:
          type: string
          example: "RESOURCE_NOT_FOUND"
        message:
          type: string
          example: "The requested SIM card with ICCID 898600... was not found."
        traceId:
          type: string
          example: "req_123456789"
    ResellerBrandingConfig:
      type: object
      properties:
        logoUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
          nullable: true
        customDomain:
          type: string
          nullable: true
    Reseller:
      type: object
      properties:
        resellerId:
          type: string
          format: uuid
        name:
          type: string
        currency:
          type: string
          nullable: true
        status:
          type: string
          enum: [ACTIVE, DEACTIVATED, SUSPENDED]
        brandingConfig:
          $ref: '#/components/schemas/ResellerBrandingConfig'
        createdAt:
          type: string
          format: date-time
    ResellerCreateRequest:
      type: object
      required: [name, currency, contactEmail]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        currency:
          type: string
          description: ISO 4217 currency code
        contactEmail:
          type: string
          format: email
        contactPhone:
          type: string
          nullable: true
        brandingConfig:
          $ref: '#/components/schemas/ResellerBrandingConfig'
    ResellerUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        contactEmail:
          type: string
          format: email
        contactPhone:
          type: string
          nullable: true
        brandingConfig:
          $ref: '#/components/schemas/ResellerBrandingConfig'
    ResellerUpdateResponse:
      type: object
      properties:
        resellerId:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, DEACTIVATED, SUSPENDED]
        updatedAt:
          type: string
          format: date-time
    ResellerListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Reseller'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    ResellerStatusChangeRequest:
      type: object
      required: [status, reason]
      properties:
        status:
          type: string
          enum: [ACTIVE, DEACTIVATED, SUSPENDED]
        reason:
          type: string
    ResellerStatusChangeResponse:
      type: object
      properties:
        resellerId:
          type: string
          format: uuid
        status:
          type: string
          enum: [ACTIVE, DEACTIVATED, SUSPENDED]
        previousStatus:
          type: string
          enum: [ACTIVE, DEACTIVATED, SUSPENDED]
        changedAt:
          type: string
          format: date-time
    Enterprise:
      type: object
      properties:
        enterpriseId:
          type: string
          format: uuid
        name:
          type: string
        resellerId:
          type: string
          format: uuid
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED]
        autoSuspendEnabled:
          type: boolean
        contactEmail:
          type: string
          format: email
          nullable: true
        contactPhone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    EnterpriseCreateRequest:
      type: object
      required: [name, contactEmail]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 200
        resellerId:
          type: string
          format: uuid
          nullable: true
        autoSuspendEnabled:
          type: boolean
        contactEmail:
          type: string
          format: email
        contactPhone:
          type: string
          nullable: true
    EnterpriseListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Enterprise'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    EnterpriseStatusChangeRequest:
      type: object
      required: [status, reason]
      properties:
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED]
        reason:
          type: string
    EnterpriseStatusChangeResponse:
      type: object
      properties:
        enterpriseId:
          type: string
          format: uuid
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED]
        previousStatus:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED]
        changedAt:
          type: string
          format: date-time
    EnterpriseDunningSummary:
      type: object
      description: Live summary from getEnterpriseDunningSummary (overdue bills + policy-derived status).
      properties:
        enterpriseId:
          type: string
          format: uuid
        dunningStatus:
          type: string
          enum: [NORMAL, OVERDUE_WARNING, SUSPENDED, SERVICE_INTERRUPTED]
        overdueAmount:
          type: number
        oldestOverdueBillId:
          type: string
          format: uuid
          nullable: true
        oldestOverduePeriod:
          type: string
          nullable: true
          description: YYYY-MM of oldest overdue bill period
        daysOverdue:
          type: integer
        gracePeriodDays:
          type: integer
        nextAction:
          type: string
          nullable: true
          description: e.g. OVERDUE_REMINDER, MANUAL_REVIEW, or null when NORMAL
        nextActionDate:
          type: string
          format: date-time
          nullable: true
        autoSuspendEnabled:
          type: boolean
        lateFeeAmount:
          type: number
          description: Estimated late fee from configured rule (when policy enabled).
    EnterpriseDunningResolveResponse:
      type: object
      properties:
        enterpriseId:
          type: string
          format: uuid
        dunningStatus:
          type: string
          example: NORMAL
        enterpriseStatus:
          type: string
          nullable: true
        resolvedAt:
          type: string
          format: date-time
    Department:
      type: object
      properties:
        departmentId:
          type: string
          format: uuid
        enterpriseId:
          type: string
          format: uuid
        name:
          type: string
        createdAt:
          type: string
          format: date-time
    DepartmentCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
    DepartmentListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Department'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    Operator:
      type: object
      properties:
        operatorId:
          type: string
          format: uuid
        mcc:
          type: string
        mnc:
          type: string
        name:
          type: string
    OperatorCreateRequest:
      type: object
      required: [mcc, mnc, name]
      properties:
        mcc:
          type: string
        mnc:
          type: string
        name:
          type: string
      example:
        mcc: "460"
        mnc: "01"
        name: "China Unicom"
    OperatorUpdateRequest:
      type: object
      properties:
        name:
          type: string
    OperatorListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Operator'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    Supplier:
      type: object
      properties:
        supplierId:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, SUSPENDED]
        createdAt:
          type: string
          format: date-time
        operatorIds:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
        operators:
          type: array
          items:
            $ref: '#/components/schemas/SupplierBoundOperator'
          nullable: true
    SupplierBoundOperator:
      type: object
      properties:
        operatorId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          nullable: true
        mcc:
          type: string
          nullable: true
        mnc:
          type: string
          nullable: true
    SupplierCreateRequest:
      type: object
      required: [name, operatorIds]
      properties:
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, SUSPENDED]
        operatorIds:
          type: array
          items:
            type: string
            format: uuid
      example:
        name: "Global IoT Supplier"
        status: ACTIVE
        operatorIds: ["7f0aa3c1-0c2a-4a8c-9a4b-7d6a7bbf9a1d"]
    SupplierUpdateRequest:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, SUSPENDED]
    SupplierUpdateResponse:
      type: object
      properties:
        supplierId:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, SUSPENDED]
        updatedAt:
          type: string
          format: date-time
    SupplierListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Supplier'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    SupplierStatusChangeRequest:
      type: object
      required: [status, reason]
      properties:
        status:
          type: string
          enum: [ACTIVE, SUSPENDED]
        reason:
          type: string
      example:
        status: SUSPENDED
        reason: "Carrier compliance review"
    SupplierStatusChangeResponse:
      type: object
      properties:
        supplierId:
          type: string
          format: uuid
        status:
          type: string
          enum: [ACTIVE, SUSPENDED]
        previousStatus:
          type: string
          enum: [ACTIVE, SUSPENDED]
        changedAt:
          type: string
          format: date-time
    SupplierBindOperatorRequest:
      type: object
      required: [operatorId]
      properties:
        operatorId:
          type: string
          format: uuid
    SupplierBindOperatorResponse:
      type: object
      properties:
        supplierId:
          type: string
          format: uuid
        operatorId:
          type: string
          format: uuid
        supplierOperatorId:
          type: string
          format: uuid
    ResellerBindSupplierRequest:
      type: object
      required: [supplierId]
      properties:
        supplierId:
          type: string
          format: uuid
    ResellerBindSupplierResponse:
      type: object
      properties:
        resellerId:
          type: string
          format: uuid
        supplierId:
          type: string
          format: uuid
        boundAt:
          type: string
          format: date-time
          nullable: true
    ResellerSupplierBinding:
      type: object
      properties:
        supplierId:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        status:
          type: string
          enum: [ACTIVE, SUSPENDED]
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        boundAt:
          type: string
          format: date-time
          nullable: true
    ResellerSuppliersListResponse:
      type: object
      properties:
        resellerId:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: '#/components/schemas/ResellerSupplierBinding'
        total:
          type: integer

    TenantUser:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        resellerId:
          type: string
          format: uuid
          nullable: true
        enterpriseId:
          type: string
          format: uuid
          nullable: true
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          type: string
        status:
          type: string
        assignedEnterpriseIds:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
        departmentId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
    ResellerUserCreateRequest:
      type: object
      required: [email, displayName, role]
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          type: string
          enum: [reseller_admin, reseller_sales_director, reseller_sales, reseller_finance]
        assignedEnterpriseIds:
          type: array
          items:
            type: string
            format: uuid
      example:
        email: "sales.director@reseller.com"
        displayName: "Reseller Sales Director"
        role: reseller_sales_director
        assignedEnterpriseIds: ["2c6b8f18-2dbf-4e7f-8bc7-96b81b48279b"]
    ResellerUserAssignEnterprisesRequest:
      type: object
      required: [assignedEnterpriseIds]
      properties:
        assignedEnterpriseIds:
          type: array
          items:
            type: string
            format: uuid
      example:
        assignedEnterpriseIds: ["2c6b8f18-2dbf-4e7f-8bc7-96b81b48279b"]
    ResellerUserAssignEnterprisesResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        resellerId:
          type: string
          format: uuid
        assignedEnterpriseIds:
          type: array
          items:
            type: string
            format: uuid
    EnterpriseUserCreateRequest:
      type: object
      required: [email, displayName, role]
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          type: string
          enum: [customer_admin, customer_ops]
        departmentId:
          type: string
          format: uuid
          nullable: true
      example:
        email: "ops@enterprise.com"
        displayName: "Enterprise Ops"
        role: customer_ops
        departmentId: "d9eb2b8b-9b55-4030-9d2a-2b7bbd3dd1c2"
    EnterpriseUserAssignDepartmentsRequest:
      type: object
      required: [assignedDepartmentIds]
      properties:
        assignedDepartmentIds:
          type: array
          items:
            type: string
            format: uuid
      example:
        assignedDepartmentIds: ["d9eb2b8b-9b55-4030-9d2a-2b7bbd3dd1c2"]
    EnterpriseUserAssignDepartmentsResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        enterpriseId:
          type: string
          format: uuid
        assignedDepartmentIds:
          type: array
          items:
            type: string
            format: uuid
    TenantUserListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TenantUser'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    AuditLogListItem:
      type: object
      properties:
        logId:
          type: string
          format: uuid
        actor:
          type: string
          format: uuid
          nullable: true
        actorRole:
          type: string
          nullable: true
        tenantScope:
          type: string
          format: uuid
          nullable: true
        action:
          type: string
        target:
          type: string
          nullable: true
        before:
          type: object
          nullable: true
        after:
          type: object
          nullable: true
        requestId:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
        sourceIp:
          type: string
          nullable: true
    AuditLogListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogListItem'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    Alert:
      type: object
      properties:
        alertId:
          type: string
          format: uuid
        alertType:
          type: string
          enum: [POOL_USAGE_HIGH, OUT_OF_PROFILE_SURGE, SILENT_SIM, UNEXPECTED_ROAMING, CDR_DELAY, UPSTREAM_DISCONNECT]
        severity:
          type: string
          enum: [P0, P1, P2, P3]
        status:
          type: string
          enum: [OPEN, ACKED, RESOLVED, SUPPRESSED]
        enterpriseId:
          type: string
          format: uuid
          nullable: true
        simId:
          type: string
          format: uuid
          nullable: true
        iccid:
          type: string
          nullable: true
        threshold:
          type: number
          nullable: true
        currentValue:
          type: number
          nullable: true
        message:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
        windowStart:
          type: string
          format: date-time
        windowEnd:
          type: string
          format: date-time
          nullable: true
        firstSeenAt:
          type: string
          format: date-time
          nullable: true
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
        acknowledgedAt:
          type: string
          format: date-time
          nullable: true
        acknowledgedBy:
          type: string
          nullable: true
        suppressedUntil:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    AlertSummary:
      type: object
      properties:
        total:
          type: integer
        bySeverity:
          type: object
          additionalProperties:
            type: integer
        byType:
          type: object
          additionalProperties:
            type: integer

    AlertTrend:
      type: object
      properties:
        buckets:
          type: array
          items:
            type: object
            properties:
              ts:
                type: string
                format: date-time
              count:
                type: integer

    UsageTrendReport:
      type: object
      properties:
        granularity:
          type: string
          enum: [day, month]
        startDate:
          type: string
        endDate:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              period:
                type: string
              totalKb:
                type: number

    TopSimsReport:
      type: object
      properties:
        startDate:
          type: string
        endDate:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              iccid:
                type: string
              totalKb:
                type: number

    AnomalySimsReport:
      type: object
      properties:
        startDate:
          type: string
        endDate:
          type: string
        total:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              simId:
                type: string
              iccid:
                type: string
                nullable: true
              alertCount:
                type: integer
              latestAlertType:
                type: string
                nullable: true
              latestSeverity:
                type: string
                nullable: true
              latestStatus:
                type: string
                nullable: true
              lastSeenAt:
                type: string
                format: date-time
                nullable: true

    DeactivationReasonsReport:
      type: object
      properties:
        startDate:
          type: string
        endDate:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              reason:
                type: string
              count:
                type: integer

    AuthTokenRequest:
      type: object
      required: [clientId, clientSecret]
      properties:
        clientId:
          type: string
        clientSecret:
          type: string

    AuthTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        expiresIn:
          type: integer
        tokenType:
          type: string

    AuthUser:
      type: object
      properties:
        userId:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        roleScope:
          type: string
        resellerId:
          type: string
          format: uuid
          nullable: true
        customerId:
          type: string
          format: uuid
          nullable: true

    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthLoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        expiresIn:
          type: integer
        tokenType:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'

    AuthRefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthRefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
        expiresIn:
          type: integer
        tokenType:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'

    AlertsListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Alert'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    ShareLinkListItem:
      type: object
      properties:
        code:
          type: string
        enterpriseId:
          type: string
          nullable: true
        kind:
          type: string
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        requestId:
          type: string
          nullable: true
        url:
          type: string
          description: Resolved short link URL

    ShareLinkListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ShareLinkListItem'
        total:
          type: integer

    ShareLinkInvalidateResponse:
      type: object
      properties:
        code:
          type: string
        expiresAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [INVALIDATED]

    ShareLinkDeleteResponse:
      type: object
      properties:
        code:
          type: string
        deleted:
          type: boolean

    ShareLinkCreateRequest:
      type: object
      required: [kind, params]
      properties:
        kind:
          type: string
