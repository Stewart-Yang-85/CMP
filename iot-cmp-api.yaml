    post:
      tags: [Enterprises, Dunning]
      summary: Resolve dunning (credit control clear)
      description: >
        Clears non-NORMAL `dunning_records` when there are **no** overdue bills (PUBLISHED/OVERDUE with due_date passed).
        **Auth:** `platform` / `platform_admin`, or `reseller_admin` (enterprise must be in reseller scope).
      security:
        - BearerAuth: []
      parameters:
        - name: enterpriseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        description: >
          **服务端不读取任何 body 字段**，仅使用路径上的 `enterpriseId`。
          在 Swagger 中可留空，或发送 `{}`。
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              description: No request properties; send `{}` if your client requires a JSON body.
            example: {}
      responses:
        '200':
          description: Dunning resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseDunningResolveResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Enterprise not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Enterprise still has overdue bills
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
