<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .subtitle { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .text { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .muted { fill: #4b5563; }
      .card { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 14; }
      .pill { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1.5; rx: 18; }
      .pill2 { fill: #ecfeff; stroke: #a5f3fc; stroke-width: 1.5; rx: 18; }
      .pill3 { fill: #f0fdf4; stroke: #bbf7d0; stroke-width: 1.5; rx: 18; }
      .arrow { stroke: #111827; stroke-width: 2.5; fill: none; marker-end: url(#arrowHead); }
      .dashed { stroke-dasharray: 6 6; }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="820" fill="#f8fafc" />

  <text x="60" y="70" class="title">角色与租户模型（Chapter 1）</text>
  <text x="60" y="105" class="text muted">目标：向客户清晰说明多租户层级、角色（RBAC）及权限边界</text>

  <rect x="60" y="140" width="1280" height="300" class="card" />
  <text x="90" y="185" class="subtitle">1) 租户层级（Supplier → Reseller → Enterprise → Department/Project）</text>

  <rect x="110" y="225" width="250" height="110" class="pill" />
  <text x="235" y="260" class="text" text-anchor="middle">供应商 / 运营商 CMP</text>
  <text x="235" y="290" class="small muted" text-anchor="middle">上游能力与数据提供方</text>
  <text x="235" y="315" class="small muted" text-anchor="middle">本期不定义其 RBAC</text>

  <rect x="470" y="225" width="250" height="110" class="pill2" />
  <text x="595" y="260" class="text" text-anchor="middle">代理商（Reseller）</text>
  <text x="595" y="290" class="small muted" text-anchor="middle">支持白标：域名 / Logo / 品牌</text>
  <text x="595" y="315" class="small muted" text-anchor="middle">管理下属企业与产品/SIM</text>

  <rect x="830" y="225" width="250" height="110" class="pill3" />
  <text x="955" y="260" class="text" text-anchor="middle">企业（Enterprise）</text>
  <text x="955" y="290" class="small muted" text-anchor="middle">拥有独立用户、SIM、订阅、账单</text>
  <text x="955" y="315" class="small muted" text-anchor="middle">状态：ACTIVE / INACTIVE / SUSPENDED</text>

  <rect x="1120" y="215" width="190" height="60" class="card" />
  <text x="1215" y="250" class="small" text-anchor="middle">部门（Department）</text>
  <text x="1215" y="270" class="small muted" text-anchor="middle">计费主体最小粒度</text>

  <rect x="1120" y="295" width="190" height="60" class="card" />
  <text x="1215" y="330" class="small" text-anchor="middle">项目（Project，可选）</text>
  <text x="1215" y="350" class="small muted" text-anchor="middle">管理/归集维度</text>

  <path d="M 360 280 L 470 280" class="arrow" />
  <path d="M 720 280 L 830 280" class="arrow" />
  <path d="M 1080 250 L 1120 250" class="arrow" />
  <path d="M 1080 310 L 1120 310" class="arrow" />

  <text x="90" y="395" class="text muted">计费主体：企业/部门（两级）；平台默认最小可见、最小可操作</text>

  <rect x="60" y="470" width="1280" height="300" class="card" />
  <text x="90" y="515" class="subtitle">2) 角色（RBAC）与权限边界</text>

  <rect x="110" y="555" width="360" height="170" class="card" />
  <text x="140" y="595" class="text">系统管理员（平台级，仅内部）</text>
  <text x="140" y="625" class="small muted">范围：全局（所有代理商/企业）</text>
  <text x="140" y="650" class="small muted">职责：租户初始化、全局配置、运维与审计</text>
  <text x="140" y="675" class="small muted">数据隔离：无（平台超级权限）</text>

  <rect x="520" y="555" width="380" height="170" class="card" />
  <text x="550" y="595" class="text">代理商组织内角色</text>
  <text x="550" y="625" class="small muted">管理员：本代理商 + 下属全部企业（全权限）</text>
  <text x="550" y="650" class="small muted">销售总监：被分配企业集合 + 管理下属销售</text>
  <text x="550" y="675" class="small muted">销售：被分配企业集合（无跨企业权限）</text>
  <text x="550" y="700" class="small muted">财务：代理商维度财务数据（只读）</text>

  <rect x="950" y="555" width="360" height="170" class="card" />
  <text x="980" y="595" class="text">企业组织内角色</text>
  <text x="980" y="625" class="small muted">管理员：本企业 + 全部门（全权限）</text>
  <text x="980" y="650" class="small muted">运维：仅所属部门授权的 SIM（受操作清单限制）</text>
  <text x="980" y="675" class="small muted">企业状态为 SUSPENDED 时：企业侧管理操作被禁止</text>

  <path d="M 470 640 L 520 640" class="arrow dashed" />
  <path d="M 900 640 L 950 640" class="arrow dashed" />

  <text x="90" y="745" class="small muted">隔离原则：系统管理员 / 代理商组织 / 企业组织 / 部门 分层隔离与授权；关键操作必须审计</text>
</svg>
