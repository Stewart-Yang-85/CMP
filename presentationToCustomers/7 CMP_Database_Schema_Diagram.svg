<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #1f2d3d; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #6b7785; }
      .group-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #1f2d3d; }
      .box-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; }
      .box-body { font-family: Arial, sans-serif; font-size: 11px; fill: #ffffff; opacity: 0.95; }
      .box { filter: url(#shadow); }
      .link { stroke: #9aa4af; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .link-dashed { stroke: #9aa4af; stroke-width: 2; stroke-dasharray: 6,6; fill: none; marker-end: url(#arrow); }
      .panel { fill: #f7f8fa; stroke: #e2e6ea; stroke-width: 2; }
      .tag { font-family: Arial, sans-serif; font-size: 11px; fill: #6b7785; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9aa4af"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="1100" fill="#ffffff"/>

  <text x="800" y="46" text-anchor="middle" class="title">CMP Database Schema Overview</text>
  <text x="800" y="70" text-anchor="middle" class="subtitle">Derived from CMP_Database_Schema.sql (PostgreSQL). Boxes are tables; arrows are FK references.</text>

  <g transform="translate(40, 100)">
    <rect class="panel" x="0" y="0" width="520" height="240" rx="10"/>
    <text x="16" y="30" class="group-title">Master Data</text>

    <g class="box" transform="translate(20, 55)">
      <rect x="0" y="0" width="220" height="80" rx="8" fill="#2f80ed"/>
      <text x="12" y="24" class="box-title">suppliers</text>
      <text x="12" y="44" class="box-body">supplier_id (PK)</text>
      <text x="12" y="60" class="box-body">name, status</text>
    </g>

    <g class="box" transform="translate(270, 55)">
      <rect x="0" y="0" width="220" height="80" rx="8" fill="#2f80ed"/>
      <text x="12" y="24" class="box-title">carriers</text>
      <text x="12" y="44" class="box-body">carrier_id (PK)</text>
      <text x="12" y="60" class="box-body">(mcc,mnc) UNIQUE</text>
    </g>

    <g class="box" transform="translate(145, 150)">
      <rect x="0" y="0" width="230" height="70" rx="8" fill="#2f80ed"/>
      <text x="12" y="24" class="box-title">supplier_carriers</text>
      <text x="12" y="44" class="box-body">(supplier_id, carrier_id) PK</text>
      <text x="12" y="60" class="box-body">m:n mapping</text>
    </g>
  </g>

  <g transform="translate(600, 100)">
    <rect class="panel" x="0" y="0" width="960" height="240" rx="10"/>
    <text x="16" y="30" class="group-title">Tenant &amp; IAM</text>

    <g class="box" transform="translate(20, 55)">
      <rect x="0" y="0" width="260" height="110" rx="8" fill="#27ae60"/>
      <text x="12" y="24" class="box-title">tenants</text>
      <text x="12" y="44" class="box-body">tenant_id (PK), parent_id (FK tenants)</text>
      <text x="12" y="60" class="box-body">tenant_type, enterprise_status</text>
      <text x="12" y="76" class="box-body">auto_suspend_enabled</text>
      <text x="12" y="92" class="box-body">code UNIQUE, name</text>
    </g>

    <g class="box" transform="translate(310, 55)">
      <rect x="0" y="0" width="260" height="80" rx="8" fill="#27ae60"/>
      <text x="12" y="24" class="box-title">users</text>
      <text x="12" y="44" class="box-body">user_id (PK), tenant_id (FK tenants)</text>
      <text x="12" y="60" class="box-body">email UNIQUE per tenant</text>
    </g>

    <g class="box" transform="translate(600, 55)">
      <rect x="0" y="0" width="260" height="70" rx="8" fill="#27ae60"/>
      <text x="12" y="24" class="box-title">user_roles</text>
      <text x="12" y="44" class="box-body">(user_id, role_name) PK</text>
      <text x="12" y="60" class="box-body">role assignment</text>
    </g>

    <g class="box" transform="translate(310, 150)">
      <rect x="0" y="0" width="260" height="70" rx="8" fill="#27ae60"/>
      <text x="12" y="24" class="box-title">audit_logs</text>
      <text x="12" y="44" class="box-body">before_data/after_data JSONB</text>
      <text x="12" y="60" class="box-body">request_id, source_ip</text>
    </g>

    <g class="box" transform="translate(600, 140)">
      <rect x="0" y="0" width="260" height="80" rx="8" fill="#27ae60"/>
      <text x="12" y="24" class="box-title">jobs</text>
      <text x="12" y="44" class="box-body">job_id (PK), status, progress</text>
      <text x="12" y="60" class="box-body">job_type, actor_user_id</text>
    </g>

    <g class="box" transform="translate(20, 180)">
      <rect x="0" y="0" width="260" height="60" rx="8" fill="#27ae60"/>
      <text x="12" y="24" class="box-title">events</text>
      <text x="12" y="44" class="box-body">event_type, occurred_at, payload JSONB</text>
    </g>
  </g>

  <g transform="translate(40, 370)">
    <rect class="panel" x="0" y="0" width="760" height="330" rx="10"/>
    <text x="16" y="30" class="group-title">SIM &amp; Lifecycle</text>

    <g class="box" transform="translate(20, 55)">
      <rect x="0" y="0" width="330" height="130" rx="8" fill="#8e44ad"/>
      <text x="12" y="24" class="box-title">sims</text>
      <text x="12" y="44" class="box-body">sim_id (PK), iccid UNIQUE, primary_imsi</text>
      <text x="12" y="60" class="box-body">supplier_id (FK suppliers), carrier_id (FK carriers)</text>
      <text x="12" y="76" class="box-body">enterprise_id/department_id (FK tenants)</text>
      <text x="12" y="92" class="box-body">status: INVENTORY/TEST_READY/ACTIVATED/DEACTIVATED/RETIRED</text>
      <text x="12" y="108" class="box-body">apn, bound_imei</text>
    </g>

    <g class="box" transform="translate(390, 55)">
      <rect x="0" y="0" width="350" height="105" rx="8" fill="#8e44ad"/>
      <text x="12" y="24" class="box-title">sim_state_history</text>
      <text x="12" y="44" class="box-body">history_id (PK), sim_id (FK sims)</text>
      <text x="12" y="60" class="box-body">before_status, after_status</text>
      <text x="12" y="76" class="box-body">start_time, end_time</text>
      <text x="12" y="92" class="box-body">source, request_id</text>
    </g>

    <g class="box" transform="translate(20, 210)">
      <rect x="0" y="0" width="340" height="100" rx="8" fill="#8e44ad"/>
      <text x="12" y="24" class="box-title">usage_daily_summary</text>
      <text x="12" y="44" class="box-body">(iccid, usage_day, visited_mccmnc) UNIQUE</text>
      <text x="12" y="60" class="box-body">supplier_id (FK suppliers), enterprise_id (FK tenants)</text>
      <text x="12" y="76" class="box-body">sim_id (FK sims), total_kb, apn, rat</text>
      <text x="12" y="92" class="box-body">input_ref</text>
    </g>

    <g class="box" transform="translate(390, 200)">
      <rect x="0" y="0" width="350" height="110" rx="8" fill="#8e44ad"/>
      <text x="12" y="24" class="box-title">cdr_files</text>
      <text x="12" y="44" class="box-body">cdr_file_id (PK), supplier_id (FK suppliers)</text>
      <text x="12" y="60" class="box-body">file_name UNIQUE per supplier, checksum</text>
      <text x="12" y="76" class="box-body">period_start/end, source_time_zone</text>
      <text x="12" y="92" class="box-body">status, received_at, ingested_at</text>
    </g>
  </g>

  <g transform="translate(830, 370)">
    <rect class="panel" x="0" y="0" width="730" height="330" rx="10"/>
    <text x="16" y="30" class="group-title">Product, Pricing &amp; Subscription</text>

    <g class="box" transform="translate(20, 55)">
      <rect x="0" y="0" width="330" height="105" rx="8" fill="#f2994a"/>
      <text x="12" y="24" class="box-title">price_plans</text>
      <text x="12" y="44" class="box-body">price_plan_id (PK), enterprise_id (FK tenants)</text>
      <text x="12" y="60" class="box-body">type, service_type, currency</text>
      <text x="12" y="76" class="box-body">billing_cycle_type, first_cycle_proration</text>
      <text x="12" y="92" class="box-body">header entity</text>
    </g>

    <g class="box" transform="translate(380, 55)">
      <rect x="0" y="0" width="330" height="120" rx="8" fill="#f2994a"/>
      <text x="12" y="24" class="box-title">price_plan_versions</text>
      <text x="12" y="44" class="box-body">(price_plan_id, version) UNIQUE</text>
      <text x="12" y="60" class="box-body">monthly_fee, deactivated_monthly_fee</text>
      <text x="12" y="76" class="box-body">tiers JSONB, payg_rates JSONB</text>
      <text x="12" y="92" class="box-body">effective_from</text>
      <text x="12" y="108" class="box-body">FK price_plans</text>
    </g>

    <g class="box" transform="translate(20, 200)">
      <rect x="0" y="0" width="330" height="85" rx="8" fill="#f2994a"/>
      <text x="12" y="24" class="box-title">packages</text>
      <text x="12" y="44" class="box-body">package_id (PK), enterprise_id (FK tenants)</text>
      <text x="12" y="60" class="box-body">name</text>
      <text x="12" y="76" class="box-body">header entity</text>
    </g>

    <g class="box" transform="translate(380, 200)">
      <rect x="0" y="0" width="330" height="120" rx="8" fill="#f2994a"/>
      <text x="12" y="24" class="box-title">package_versions</text>
      <text x="12" y="44" class="box-body">(package_id, version) UNIQUE</text>
      <text x="12" y="60" class="box-body">supplier_id (FK suppliers), carrier_id (FK carriers)</text>
      <text x="12" y="76" class="box-body">apn, roaming_profile, commercial_terms</text>
      <text x="12" y="92" class="box-body">price_plan_version_id (FK price_plan_versions)</text>
      <text x="12" y="108" class="box-body">effective_from, status</text>
    </g>

    <g class="box" transform="translate(20, 305)">
      <rect x="0" y="0" width="690" height="80" rx="8" fill="#f2994a"/>
      <text x="12" y="24" class="box-title">subscriptions</text>
      <text x="12" y="44" class="box-body">subscription_id (PK), sim_id (FK sims), package_version_id (FK package_versions)</text>
      <text x="12" y="60" class="box-body">enterprise_id (FK tenants), subscription_kind (MAIN/ADD_ON), state, effective_at</text>
      <text x="12" y="76" class="box-body">first_subscribed_at, commitment_end_at</text>
    </g>
  </g>

  <g transform="translate(40, 730)">
    <rect class="panel" x="0" y="0" width="1520" height="320" rx="10"/>
    <text x="16" y="30" class="group-title">Billing, Invoicing &amp; Adjustments</text>

    <g class="box" transform="translate(20, 55)">
      <rect x="0" y="0" width="340" height="120" rx="8" fill="#34495e"/>
      <text x="12" y="24" class="box-title">bills</text>
      <text x="12" y="44" class="box-body">bill_id (PK), enterprise_id (FK tenants)</text>
      <text x="12" y="60" class="box-body">period_start/end, status</text>
      <text x="12" y="76" class="box-body">currency, total_amount, due_date</text>
      <text x="12" y="92" class="box-body">generated_at, published_at, paid_at</text>
      <text x="12" y="108" class="box-body">UNIQUE (enterprise_id, period_start, period_end)</text>
    </g>

    <g class="box" transform="translate(390, 55)">
      <rect x="0" y="0" width="360" height="95" rx="8" fill="#34495e"/>
      <text x="12" y="24" class="box-title">bill_line_items</text>
      <text x="12" y="44" class="box-body">line_item_id (PK), bill_id (FK bills)</text>
      <text x="12" y="60" class="box-body">amount, item_type, metadata JSONB</text>
      <text x="12" y="76" class="box-body">sim_id, package_version_id (optional links)</text>
    </g>

    <g class="box" transform="translate(790, 55)">
      <rect x="0" y="0" width="350" height="110" rx="8" fill="#34495e"/>
      <text x="12" y="24" class="box-title">adjustment_notes</text>
      <text x="12" y="44" class="box-body">note_id (PK), enterprise_id (FK tenants)</text>
      <text x="12" y="60" class="box-body">note_type (CREDIT/DEBIT), status</text>
      <text x="12" y="76" class="box-body">total_amount, currency, reason</text>
      <text x="12" y="92" class="box-body">input_ref, calculation_id</text>
    </g>

    <g class="box" transform="translate(1170, 55)">
      <rect x="0" y="0" width="330" height="95" rx="8" fill="#34495e"/>
      <text x="12" y="24" class="box-title">adjustment_note_items</text>
      <text x="12" y="44" class="box-body">note_item_id (PK), note_id (FK adjustment_notes)</text>
      <text x="12" y="60" class="box-body">amount, item_type, metadata JSONB</text>
      <text x="12" y="76" class="box-body">sim_id (optional link)</text>
    </g>

    <text x="20" y="220" class="tag">Operational flows: CDR files ingest → usage_daily_summary → rating → bills; late CDRs → adjustment_notes</text>
  </g>

  <path class="link" d="M 265 250 L 185 250"/>
  <path class="link" d="M 375 250 L 495 250"/>

  <path class="link" d="M 910 230 L 910 190"/>
  <path class="link" d="M 1150 230 L 1150 190"/>
  <path class="link" d="M 1300 225 L 1300 190"/>

  <path class="link" d="M 410 480 L 410 445"/>
  <path class="link" d="M 285 555 L 285 500"/>
  <path class="link" d="M 410 635 L 410 500"/>
  <path class="link" d="M 285 700 L 285 650"/>
  <path class="link" d="M 520 700 L 520 650"/>

  <path class="link" d="M 1210 480 L 1210 445"/>
  <path class="link" d="M 1390 480 L 1390 445"/>
  <path class="link" d="M 1210 585 L 1210 555"/>
  <path class="link" d="M 1390 585 L 1390 555"/>

  <path class="link" d="M 1210 675 L 1210 655"/>
  <path class="link" d="M 1010 675 L 1010 655"/>
  <path class="link" d="M 1390 675 L 1390 655"/>

  <path class="link" d="M 1240 845 L 1240 815"/>
  <path class="link" d="M 1450 845 L 1450 815"/>
  <path class="link" d="M 1265 910 L 1265 885"/>

  <path class="link-dashed" d="M 670 910 L 670 700"/>
  <text x="682" y="790" class="tag">(optional) links to sim/package</text>
</svg>
