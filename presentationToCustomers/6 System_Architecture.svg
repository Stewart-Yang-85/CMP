<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 26px; font-weight: bold; fill: #2c3e50; }
      .subtitle { font-family: Arial, sans-serif; font-size: 16px; fill: #7f8c8d; }
      .layer-label { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; text-transform: uppercase; writing-mode: vertical-rl; text-orientation: mixed; }
      .box-label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
      .box-sublabel { font-family: Arial, sans-serif; font-size: 11px; fill: #ecf0f1; }
      .arrow { stroke: #95a5a6; stroke-width: 2; marker-end: url(#arrowhead); }
      .dashed-arrow { stroke: #95a5a6; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
      .db-label { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #2c3e50; }
      .note { font-family: Arial, sans-serif; font-size: 11px; fill: #7f8c8d; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#95a5a6"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d35400;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#f8f9fa"/>
  
  <text x="600" y="40" text-anchor="middle" class="title">Reseller System Technical Architecture</text>
  <text x="600" y="70" text-anchor="middle" class="subtitle">Northbound REST/Webhook • Event-Driven Microservices • Multi-Vendor Virtualization</text>

  <rect x="50" y="100" width="1100" height="120" rx="5" fill="#e8f6f3" stroke="#a2d9ce"/>
  <text x="80" y="160" class="layer-label">Access Layer</text>

  <rect x="50" y="240" width="1100" height="80" rx="5" fill="#ebf5fb" stroke="#aed6f1"/>
  <text x="80" y="280" class="layer-label">Gateway</text>

  <rect x="50" y="340" width="1100" height="300" rx="5" fill="#f4ecf7" stroke="#d2b4de"/>
  <text x="80" y="490" class="layer-label">Core Services</text>

  <rect x="50" y="640" width="1100" height="100" rx="5" fill="#fef9e7" stroke="#f9e79f"/>
  <text x="80" y="690" class="layer-label">Data &amp; Msg</text>

  <rect x="50" y="760" width="1100" height="120" rx="5" fill="#fdf2e9" stroke="#f5cba7"/>
  <text x="80" y="820" class="layer-label">Virtualization</text>

  <g transform="translate(150, 120)">
    <rect width="180" height="80" rx="5" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="90" y="35" text-anchor="middle" class="box-label">Enterprise Portal</text>
    <text x="90" y="55" text-anchor="middle" class="box-sublabel">Ops / Usage / Billing</text>
  </g>
  <g transform="translate(450, 120)">
    <rect width="180" height="80" rx="5" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="90" y="35" text-anchor="middle" class="box-label">Reseller Admin Portal</text>
    <text x="90" y="55" text-anchor="middle" class="box-sublabel">Ops / Finance / Audit</text>
  </g>
  <g transform="translate(750, 120)">
    <rect width="180" height="80" rx="5" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="90" y="35" text-anchor="middle" class="box-label">Northbound API</text>
    <text x="90" y="55" text-anchor="middle" class="box-sublabel">REST • Webhook • OpenAPI</text>
    <text x="90" y="70" text-anchor="middle" class="box-sublabel">OAuth2/API Key • HMAC</text>
  </g>

  <g transform="translate(300, 255)">
    <rect width="600" height="50" rx="5" fill="#34495e" filter="url(#shadow)"/>
    <text x="300" y="30" text-anchor="middle" class="box-label">API Gateway</text>
    <text x="300" y="45" text-anchor="middle" class="box-sublabel" fill="#bdc3c7" font-size="10">AuthN/AuthZ • Rate Limiting • Routing • Audit Logging</text>
  </g>

  <g transform="translate(150, 360)">
    <rect x="0" y="0" width="250" height="90" rx="5" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="125" y="38" text-anchor="middle" class="box-label">Inventory</text>
    <text x="125" y="58" text-anchor="middle" class="box-sublabel">SIM Lifecycle</text>
    <text x="125" y="73" text-anchor="middle" class="box-sublabel">State Mirror &amp; Audit</text>

    <rect x="325" y="0" width="250" height="90" rx="5" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="450" y="38" text-anchor="middle" class="box-label">Provisioning</text>
    <text x="450" y="58" text-anchor="middle" class="box-sublabel">Async Commands</text>
    <text x="450" y="73" text-anchor="middle" class="box-sublabel">Idempotency + Retry</text>

    <rect x="650" y="0" width="250" height="90" rx="5" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="775" y="38" text-anchor="middle" class="box-label">Billing &amp; Rating</text>
    <text x="775" y="58" text-anchor="middle" class="box-sublabel">Rating • Invoicing</text>
    <text x="775" y="73" text-anchor="middle" class="box-sublabel">Balance • High-Water</text>

    <rect x="0" y="110" width="250" height="90" rx="5" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="125" y="148" text-anchor="middle" class="box-label">Catalog &amp; Price</text>
    <text x="125" y="168" text-anchor="middle" class="box-sublabel">Bundles • Price Plan</text>
    <text x="125" y="183" text-anchor="middle" class="box-sublabel">Zone PAYG Rates</text>

    <rect x="325" y="110" width="250" height="90" rx="5" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="450" y="148" text-anchor="middle" class="box-label">Tenant &amp; RBAC</text>
    <text x="450" y="168" text-anchor="middle" class="box-sublabel">Org • Roles</text>
    <text x="450" y="183" text-anchor="middle" class="box-sublabel">Audit Trail</text>

    <rect x="650" y="110" width="250" height="90" rx="5" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="775" y="148" text-anchor="middle" class="box-label">Alerting</text>
    <text x="775" y="168" text-anchor="middle" class="box-sublabel">Bill Shock • Roaming</text>
    <text x="775" y="183" text-anchor="middle" class="box-sublabel">Webhook Delivery</text>
  </g>

  <g transform="translate(150, 575)">
    <rect width="430" height="36" rx="18" fill="#8e44ad" filter="url(#shadow)"/>
    <text x="215" y="24" text-anchor="middle" class="box-label">Command Channel MQ</text>
    <text x="215" y="34" text-anchor="middle" class="box-sublabel" fill="#ecf0f1">(e.g. RabbitMQ)</text>

    <rect x="470" width="430" height="36" rx="18" fill="#8e44ad" filter="url(#shadow)"/>
    <text x="685" y="24" text-anchor="middle" class="box-label">Data Channel Stream</text>
    <text x="685" y="34" text-anchor="middle" class="box-sublabel" fill="#ecf0f1">(e.g. Kafka/Pulsar)</text>
  </g>

  <g transform="translate(200, 660)">
    <path d="M0,10 A40,10 0 1,1 80,10 A40,10 0 1,1 0,10 V50 A40,10 0 1,1 80,50 V10" fill="#bdc3c7" stroke="#7f8c8d"/>
    <text x="40" y="35" text-anchor="middle" class="db-label">PostgreSQL</text>
    <text x="40" y="75" text-anchor="middle" font-size="10">(Operational)</text>
  </g>
  <g transform="translate(450, 660)">
    <path d="M0,10 A40,10 0 1,1 80,10 A40,10 0 1,1 0,10 V50 A40,10 0 1,1 80,50 V10" fill="#e74c3c" stroke="#c0392b"/>
    <text x="40" y="35" text-anchor="middle" class="db-label" fill="white">Redis</text>
    <text x="40" y="75" text-anchor="middle" font-size="10">(Cache)</text>
  </g>
  <g transform="translate(700, 660)">
    <path d="M0,10 A40,10 0 1,1 80,10 A40,10 0 1,1 0,10 V50 A40,10 0 1,1 80,50 V10" fill="#f39c12" stroke="#d35400"/>
    <text x="40" y="35" text-anchor="middle" class="db-label" fill="white">Object Store</text>
    <text x="40" y="75" text-anchor="middle" font-size="10">(S3/SFTP CDR)</text>
  </g>
  <text x="930" y="700" text-anchor="middle" class="note">Metrics/Logs/Traces exported to observability stack</text>

  <g transform="translate(150, 780)">
    <rect width="900" height="80" rx="5" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="450" y="28" text-anchor="middle" class="box-label">Virtualization Layer (SPI + Adapters)</text>
    <text x="450" y="46" text-anchor="middle" class="box-sublabel">ProvisioningSPI • UsageSPI • CatalogSPI</text>
    
    <g transform="translate(100, 45)">
      <rect width="150" height="25" rx="3" fill="#fff"/>
      <text x="75" y="17" text-anchor="middle" font-size="12" font-weight="bold" fill="#d35400">Jasper Adapter</text>
    </g>
    <g transform="translate(375, 45)">
      <rect width="150" height="25" rx="3" fill="#fff"/>
      <text x="75" y="17" text-anchor="middle" font-size="12" font-weight="bold" fill="#d35400">Ericsson Adapter</text>
    </g>
    <g transform="translate(650, 45)">
      <rect width="150" height="25" rx="3" fill="#fff"/>
      <text x="75" y="17" text-anchor="middle" font-size="12" font-weight="bold" fill="#d35400">Proprietary Adapter</text>
    </g>
  </g>

  <line x1="240" y1="200" x2="450" y2="255" class="arrow"/>
  <line x1="540" y1="200" x2="540" y2="255" class="arrow"/>
  <line x1="840" y1="200" x2="650" y2="255" class="arrow"/>

  <line x1="500" y1="305" x2="275" y2="360" class="arrow"/>
  <line x1="600" y1="305" x2="600" y2="360" class="arrow"/>
  <line x1="700" y1="305" x2="925" y2="360" class="arrow"/>

  <line x1="365" y1="611" x2="240" y2="660" class="arrow"/>
  <line x1="600" y1="611" x2="490" y2="660" class="arrow"/>
  <line x1="835" y1="611" x2="740" y2="660" class="arrow"/>

  <line x1="600" y1="611" x2="600" y2="780" class="dashed-arrow"/>
  <text x="612" y="665" class="note">SPI calls • Async jobs • Idempotency</text>

  <line x1="740" y1="740" x2="740" y2="780" class="dashed-arrow"/>
  <text x="752" y="770" class="note">CDR files via SFTP/S3</text>

  <line x1="600" y1="860" x2="600" y2="900" class="arrow"/>
  <text x="600" y="890" text-anchor="middle" font-size="12" font-weight="bold" fill="#7f8c8d">To Supplier/Operator CMPs</text>

</svg>
